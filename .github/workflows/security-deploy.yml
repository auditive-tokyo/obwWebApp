name: Deploy Security Stack (CloudFront + WAF)

on:
  push:
    branches: [main, feature/*]
    paths:
      - "template-security.yaml"
      - ".github/workflows/security-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: us-east-1 # CloudFrontはus-east-1必須

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133 # v2

      # CloudFront SecretはGitHub Secretsから取得（毎回生成するとSnapStartと不整合が起きる）
      # 新しいシークレットを設定する場合は、GitHub SecretsのCLOUDFRONT_SECRETを更新し、
      # その後 twilio-deploy.yml と responseapi-deploy.yml を実行して
      # Lambdaの新しいバージョンをパブリッシュする必要がある
      #
      # 【初回デプロイ順序】
      # 1. twilio-deploy.yml (Lambda作成、CloudFront URLは空だが Default:"" でエラーにならない)
      # 2. responseapi-deploy.yml (Lambda作成、CloudFront Secretは設定済み)
      # 3. security-deploy.yml (CloudFront作成、Lambda URLを参照)
      # 4. twilio-deploy.yml (再度実行してCloudFront URLを設定)
      #
      # ※ 1,2 の時点では Lambda は作成されるが CloudFront URL が空のため正常動作しない
      # ※ 4 完了後に全機能が正常に動作する
      #
      # 【通常運用（初回デプロイ完了後）】
      # - Lambdaコード更新: 該当する twilio-deploy.yml または responseapi-deploy.yml のみ実行
      # - CloudFront/WAF設定変更: security-deploy.yml を実行
      # - Secret変更: security-deploy.yml → twilio-deploy.yml → responseapi-deploy.yml の順で実行

      - name: Get ResponseApi Function URL
        id: get_responseapi
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name obw-responseapi-function \
            --region ap-northeast-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`ChatFunctionUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "ResponseApi URL: ${URL}"

      - name: Get ImmediateResponse Function URL
        id: get_immediate
        run: |
          URL=$(aws lambda get-function-url-config \
            --function-name obw-immediate-response-function:live \
            --region ap-northeast-1 \
            --query 'FunctionUrl' \
            --output text 2>/dev/null || echo "")
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "ImmediateResponse URL: ${URL}"

      - name: Deploy Security Stack
        env:
          CLOUDFRONT_SECRET: ${{ secrets.CLOUDFRONT_SECRET }}
        run: |
          sam deploy \
            --template-file template-security.yaml \
            --stack-name obw-security \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --parameter-overrides \
              ResponseApiFunctionUrl="${{ steps.get_responseapi.outputs.url }}" \
              ImmediateResponseFunctionUrl="${{ steps.get_immediate.outputs.url }}" \
              OriginCustomHeaderSecret="$CLOUDFRONT_SECRET" \
            --no-fail-on-empty-changeset

      - name: Output Summary
        run: |
          echo "=== Security Stack Deployment Complete ==="
          echo ""
          echo "📋 CloudFront URLs (from stack outputs):"
          aws cloudformation describe-stacks \
            --stack-name obw-security \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
            --output table
          echo ""
          echo "⚠️  重要: CloudFront URLやSecretの変更をLambdaに反映するには、"
          echo "   以下のワークフローを実行してください:"
          echo "   - twilio-deploy.yml"
          echo "   - responseapi-deploy.yml"
          echo ""
          echo "✅ CloudFront distributions configured"
          echo "✅ WAF enabled with OWASP rules, IP reputation, and rate limiting"
